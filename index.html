<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Appraisal Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <header>
            <h1>Avaliação Imobiliária</h1>
            <p>Preencha os dados do imóvel abaixo.</p>
        </header>

        <form id="realEstateForm">
            <fieldset class="form-section">
                <legend>Informação Base</legend>
                <div class="grid-layout">
                    <div class="form-group full-width">
                        <label for="address">Endereço da Casa:</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                    <div class="form-group">
                        <label for="visitDate">Data da Visita:</label>
                        <input type="date" id="visitDate" name="visitDate" required>
                    </div>
                    <div class="form-group">
                        <label for="habitavel">Habitável:</label>
                        <select id="habitavel" name="habitavel" required>
                            <option value="SIM">SIM</option>
                            <option value="NÃO">NÃO</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Características Físicas</legend>
                <div class="grid-layout">
                    <div class="form-group">
                        <label for="numWCs">N.º WCs:</label>
                        <select id="numWCs" name="numWCs" required>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pisosAcimaSolo">Pisos Acima do Solo:</label>
                        <input type="number" id="pisosAcimaSolo" name="pisosAcimaSolo" min="1" max="50" value="1" required>
                    </div>
                    <div class="form-group">
                        <label for="caves">Caves:</label>
                        <select id="caves" name="caves" required>
                            <option value="0">0 (N/A)</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="sotao">Sotão:</label>
                        <select id="sotao" name="sotao" required>
                            <option value="Não">Não</option>
                            <option value="Sim">Sim</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="elevadores">Elevadores:</label>
                        <select id="elevadores" name="elevadores" required>
                            <option value="0">0 (N/A)</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5+</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="disposicaoEspacoInterior">Disposição do Espaço Interior:</label>
                        <select id="disposicaoEspacoInterior" name="disposicaoEspacoInterior" required>
                            <option value="MUITO BOA">MUITO BOA</option>
                            <option value="BOA">BOA</option>
                            <option value="RAZOÁVEL">RAZOÁVEL</option>
                            <option value="MEDIOCRE">MEDIOCRE</option>
                            <option value="MÁ">MÁ</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Anexos e Espaços Exteriores</legend>
                <div id="dynamicFeatures" class="grid-layout">
                    <div class="feature-box">
                        <label for="varandas">Varandas existem?</label>
                        <select id="varandas" name="varandas" onchange="addFeatureDetails('varandas')" required>
                            <option value="No">Não</option>
                            <option value="Yes">Sim</option>
                        </select>
                        <div id="varandasDetails" class="dynamic-details"></div>
                    </div>

                    <div class="feature-box">
                        <label for="arrecadacoes">Arrecadações existem?</label>
                        <select id="arrecadacoes" name="arrecadacoes" onchange="addFeatureDetails('arrecadacoes')" required>
                            <option value="No">Não</option>
                            <option value="Yes">Sim</option>
                        </select>
                        <div id="arrecadacoesDetails" class="dynamic-details"></div>
                    </div>

                    <div class="feature-box">
                        <label for="marquises">Marquises existem?</label>
                        <select id="marquises" name="marquises" onchange="addFeatureDetails('marquises')" required>
                            <option value="No">Não</option>
                            <option value="Yes">Sim</option>
                        </select>
                        <div id="marquisesDetails" class="dynamic-details"></div>
                    </div>

                    <div class="feature-box">
                        <label for="garagemSimples">Garagem Simples existe?</label>
                        <select id="garagemSimples" name="garagemSimples" onchange="addFeatureDetails('garagemSimples')" required>
                            <option value="No">Não</option>
                            <option value="Yes">Sim</option>
                        </select>
                        <div id="garagemSimplesDetails" class="dynamic-details"></div>
                    </div>

                    <div class="feature-box">
                        <label for="garagemDupla">Garagem Dupla existe?</label>
                        <select id="garagemDupla" name="garagemDupla" onchange="addFeatureDetails('garagemDupla')" required>
                            <option value="No">Não</option>
                            <option value="Yes">Sim</option>
                        </select>
                        <div id="garagemDuplaDetails" class="dynamic-details"></div>
                    </div>

                    <div class="feature-box">
                        <label for="parqueamentoSimples">Parq. Simples existe?</label>
                        <select id="parqueamentoSimples" name="parqueamentoSimples" onchange="addFeatureDetails('parqueamentoSimples')" required>
                            <option value="No">Não</option>
                            <option value="Yes">Sim</option>
                        </select>
                        <div id="parqueamentoSimplesDetails" class="dynamic-details"></div>
                    </div>

                    <div class="feature-box">
                        <label for="parqueamentoDuplo">Parq. Duplo existe?</label>
                        <select id="parqueamentoDuplo" name="parqueamentoDuplo" onchange="addFeatureDetails('parqueamentoDuplo')" required>
                            <option value="No">Não</option>
                            <option value="Yes">Sim</option>
                        </select>
                        <div id="parqueamentoDuploDetails" class="dynamic-details"></div>
                    </div>

                    <div class="feature-box">
                        <label for="quintal">Quintal/Logradouro existe?</label>
                        <select id="quintal" name="quintal" onchange="addFeatureDetails('quintal')" required>
                            <option value="No">Não</option>
                            <option value="Yes">Sim</option>
                        </select>
                        <div id="quintalDetails" class="dynamic-details"></div>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Construção e Qualidade</legend>
                <div class="grid-layout">
                    <div class="form-group">
                        <label for="estadoConservacao">Estado de Conservação:</label>
                        <select id="estadoConservacao" name="estadoConservacao" required>
                            <option value="NOVO">NOVO</option>
                            <option value="MUITO BOM">MUITO BOM</option>
                            <option value="BOM">BOM</option>
                            <option value="REGULAR">REGULAR</option>
                            <option value="DEFICIENTE">DEFICIENTE</option>
                            <option value="MAU">MAU</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="nivelAcabamentos">Nível de Acabamentos:</label>
                        <select id="nivelAcabamentos" name="nivelAcabamentos" required>
                            <option value="LUXO">LUXO</option>
                            <option value="MUITO BONS">MUITO BONS</option>
                            <option value="BONS">BONS</option>
                            <option value="CORRENTES">CORRENTES</option>
                            <option value="MODESTOS">MODESTOS</option>
                            <option value="MAUS">MAUS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="furQuality">Qualidade Equipamentos:</label>
                        <select id="furQuality" name="furQuality" required>
                            <option value="Péssimo">Péssimo</option>
                            <option value="Mau">Mau</option>
                            <option value="Razoável">Razoável</option>
                            <option value="Bom">Bom</option>
                            <option value="Muito Bom">Muito Bom</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="estrutura">Estrutura:</label>
                        <select id="estrutura" name="estrutura" required>
                            <option value="BETÃO ARMADO - LAJE MACIÇA">BETÃO ARMADO - LAJE MACIÇA</option>
                            <option value="BETÃO ARMADO - LAJE ALIGEIRADA">BETÃO ARMADO - LAJE ALIGEIRADA</option>
                            <option value="BETÃO ARMADO - LAJE FUNGIFORME">BETÃO ARMADO - LAJE FUNGIFORME</option>
                            <option value="BETÃO ARMADO / LAJES MISTAS - AÇO-BETÃO">BETÃO ARMADO / LAJES MISTAS - AÇO-BETÃO</option>
                            <option value="ESTRUTURA METÁLICA">ESTRUTURA METÁLICA</option>
                            <option value="ESTRUTURA MISTA (PARTE METÁLICA E PARTE BETÃO)">ESTRUTURA MISTA (PARTE METÁLICA E PARTE BETÃO)</option>
                            <option value="PAREDES RESISTENTES EM ALVENARIA - PAVIMENTO BETÃO">PAREDES RESISTENTES EM ALVENARIA - PAVIMENTO BETÃO</option>
                            <option value="PAREDES RESISTENTES EM ALVENARIA - PAVIMENTO EM MADEIRA">PAREDES RESISTENTES EM ALVENARIA - PAVIMENTO EM MADEIRA</option>
                            <option value="PRÉ-FABRICADA EM MADEIRA">PRÉ-FABRICADA EM MADEIRA</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cobertura">Cobertura:</label>
                        <select id="cobertura" name="cobertura" required>
                            <option value="TELHA">TELHA</option>
                            <option value="LAJE">LAJE</option>
                            <option value="FIBROCIMENTO">FIBROCIMENTO</option>
                            <option value="METÁLICA">METÁLICA</option>
                            <option value="AUTOPORTANTE">AUTOPORTANTE</option>
                            <option value="TELHA / LAJE">TELHA / LAJE</option>
                            <option value="TELHA / FIBROCIMENTO">TELHA / FIBROCIMENTO</option>
                            <option value="TELHA / METÁLICA">TELHA / METÁLICA</option>
                            <option value="METÁLICA / LAJE">METÁLICA / LAJE</option>
                            <option value="OUTRAS">OUTRAS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="paredes">Paredes Exteriores:</label>
                        <select id="paredes" name="paredes" required>
                            <option value="ALVENARIA DE TIJOLO">ALVENARIA DE TIJOLO</option>
                            <option value="ALVENARIA DE PEDRA">ALVENARIA DE PEDRA</option>
                            <option value="ALVENARIA DE BLOCOS EM BETÃO">ALVENARIA DE BLOCOS EM BETÃO</option>
                            <option value="PAINÉIS PRÉ-FABRICADOS EM BETÃO">PAINÉIS PRÉ-FABRICADOS EM BETÃO</option>
                            <option value="ALVENARIA DE TIJOLO MACIÇO">ALVENARIA DE TIJOLO MACIÇO</option>
                            <option value="PAINÉIS METÁLICOS">PAINÉIS METÁLICOS</option>
                            <option value="PAINÉIS 'SANDWICH'">PAINÉIS "SANDWICH"</option>
                            <option value="CHAPA DE VIDRO">CHAPA DE VIDRO</option>
                            <option value="BETÃO CELULAR AUTOCLAVADO">BETÃO CELULAR AUTOCLAVADO</option>
                            <option value="ALVENARIA / PLADUR">ALVENARIA / PLADUR</option>
                            <option value="ALVENARIA / PAINÉIS 'SANDWICH'">ALVENARIA / PAINÉIS "SANDWICH"</option>
                            <option value="ALVENARIA / CHAPA">ALVENARIA / CHAPA</option>
                            <option value="MADEIRA">MADEIRA</option>
                            <option value="OUTRAS">OUTRAS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fachadas">Fachadas:</label>
                        <select id="fachadas" name="fachadas" required>
                            <option value="PINTADA">PINTADA</option>
                            <option value="LADRILHO CERÂMICO">LADRILHO CERÂMICO</option>
                            <option value="LADRILHO PEDRA NATURAL">LADRILHO PEDRA NATURAL</option>
                            <option value="FACE À VISTA">FACE À VISTA</option>
                            <option value="MONO MASSA">MONO MASSA</option>
                            <option value="VIDRO">VIDRO</option>
                            <option value="PINTADA / LADRILHO">PINTADA / LADRILHO</option>
                            <option value="PINTADA / FACE À VISTA">PINTADA / FACE À VISTA</option>
                            <option value="PINTADA / VIDRO">PINTADA / VIDRO</option>
                            <option value="FACE À VISTA / VIDRO">FACE À VISTA / VIDRO</option>
                            <option value="OUTRA">OUTRA</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="caixilharias">Caixilharias:</label>
                        <select id="caixilharias" name="caixilharias" required>
                            <option value="ALUMÍNIO TERMO LACADO VIDRO DUPLO">ALUMÍNIO TERMO LACADO VIDRO DUPLO</option>
                            <option value="ALUMÍNIO TERMO LACADO VIDRO SIMPLES">ALUMÍNIO TERMO LACADO VIDRO SIMPLES</option>
                            <option value="ALUMÍNIO ANODIZADO VIDRO DUPLO">ALUMÍNIO ANODIZADO VIDRO DUPLO</option>
                            <option value="ALUMÍNIO ANODIZADO VIDRO SIMPLES">ALUMÍNIO ANODIZADO VIDRO SIMPLES</option>
                            <option value="EM MADEIRA">EM MADEIRA</option>
                            <option value="EM PVC">EM PVC</option>
                            <option value="METÁLICA">METÁLICA</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Revestimentos Interiores</legend>
                <div class="grid-layout">
                    <div class="form-group">
                        <label for="paredesZonasSecas">Paredes - ZONAS SECAS:</label>
                        <select id="paredesZonasSecas" name="paredesZonasSecas" required>
                            <option value="PINTADAS">PINTADAS</option>
                            <option value="PAPEL">PAPEL</option>
                            <option value="MADEIRA">MADEIRA</option>
                            <option value="PINTADAS / REVESTIMENTO CERÂMICO">PINTADAS / REVESTIMENTO CERÂMICO</option>
                            <option value="PINTADAS / REVESTIMENTO EM PEDRA">PINTADAS / REVESTIMENTO EM PEDRA</option>
                            <option value="PINTADAS / PAPEL">PINTADAS / PAPEL</option>
                            <option value="OUTROS">OUTROS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="paredesZonasHumidas">Paredes - ZONAS HÚMIDAS:</label>
                        <select id="paredesZonasHumidas" name="paredesZonasHumidas" required>
                            <option value="REVESTIMENTO CERÂMICO">REVESTIMENTO CERÂMICO</option>
                            <option value="REVESTIMENTO EM PEDRA">REVESTIMENTO EM PEDRA</option>
                            <option value="PINTADAS">PINTADAS</option>
                            <option value="PINTADAS / REVESTIMENTO CERÂMICO">PINTADAS / REVESTIMENTO CERÂMICO</option>
                            <option value="PINTADAS / REVESTIMENTO EM PEDRA">PINTADAS / REVESTIMENTO EM PEDRA</option>
                            <option value="OUTROS">OUTROS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pavimentosZonasSecas">Pavimentos - ZONAS SECAS:</label>
                        <select id="pavimentosZonasSecas" name="pavimentosZonasSecas" required>
                            <option value="MOSAICO CERÂMICO E PAVIMENTO FLUTUANTE">MOSAICO CERÂMICO E PAVIMENTO FLUTUANTE</option>
                            <option value="PAVIMENTO FLUTUANTE (REVESTIMENTO SINTÉTICO)">PAVIMENTO FLUTUANTE (REVESTIMENTO SINTÉTICO)</option>
                            <option value="PAVIMENTO FLUTUANTE (REVESTIMENTO MADEIRA)">PAVIMENTO FLUTUANTE (REVESTIMENTO MADEIRA)</option>
                            <option value="MOSAICO CERÂMICO">MOSAICO CERÂMICO</option>
                            <option value="PARQUET / TACO EM MADEIRA">PARQUET / TACO EM MADEIRA</option>
                            <option value="SOALHO">SOALHO</option>
                            <option value="PEDRA NATURAL">PEDRA NATURAL</option>
                            <option value="MÁRMORE">MÁRMORE</option>
                            <option value="GRANITO">GRANITO</option>
                            <option value="MARMORITE">MARMORITE</option>
                            <option value="VINÍLICO">VINÍLICO</option>
                            <option value="EM CORTICITE">EM CORTICITE</option>
                            <option value="BETONILHA">BETONILHA</option>
                            <option value="OUTRO">OUTRO</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pavimentosZonasHumidas">Pavimentos - ZONAS HÚMIDAS:</label>
                        <select id="pavimentosZonasHumidas" name="pavimentosZonasHumidas" required>
                            <option value="MOSAICO CERÂMICO">MOSAICO CERÂMICO</option>
                            <option value="MOSAICO HIDRÁULICO">MOSAICO HIDRÁULICO</option>
                            <option value="PEDRA NATURAL">PEDRA NATURAL</option>
                            <option value="MÁRMORE">MÁRMORE</option>
                            <option value="GRANITO">GRANITO</option>
                            <option value="MARMORITE">MARMORITE</option>
                            <option value="VINÍLICO">VINÍLICO</option>
                            <option value="BETONILHA">BETONILHA</option>
                            <option value="OUTRO">OUTRO</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Conforto e Eficiência</legend>
                <div class="grid-layout">
                    <div class="form-group">
                        <label for="climatizacao">Climatização:</label>
                        <select id="climatizacao" name="climatizacao" required>
                            <option value="NENHUMA / N/A">NENHUMA / N/A</option>
                            <option value="AQUECIMENTO CENTRAL">AQUECIMENTO CENTRAL</option>
                            <option value="AR CONDICIONADO">AR CONDICIONADO</option>
                            <option value="AQUECIMENTO CENTRAL E AR ACONDICIONADO">AQUECIMENTO CENTRAL E AR ACONDICIONADO</option>
                            <option value="AQUECIMENTO E PRÉ-INSTALAÇÃO DE AR-CONDICIONADO">AQUECIMENTO E PRÉ-INSTALAÇÃO DE AR-CONDICIONADO</option>
                            <option value="AR CONDICIONADO E PRÉ-INSTALAÇÃO DE AQUECIMENTO">AR CONDICIONADO E PRÉ-INSTALAÇÃO DE AQUECIMENTO</option>
                            <option value="PAVIMENTO RADIANTE">PAVIMENTO RADIANTE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="classeEnergetica">Classe Energética:</label>
                        <select id="classeEnergetica" name="classeEnergetica" required>
                            <option value="A+">A+</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="B-">B-</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="F">F</option>
                            <option value="G">G</option>
                            <option value="S/ Certificado / N/A">S/ Certificado / N/A</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="captacaoSolar">Captação Solar:</label>
                        <select id="captacaoSolar" name="captacaoSolar" required>
                            <option value="SIM">SIM</option>
                            <option value="NÃO">NÃO</option>
                            <option value="N/A">N/A</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="instalacaoGasNatural">Gás Natural:</label>
                        <select id="instalacaoGasNatural" name="instalacaoGasNatural" required>
                            <option value="SIM">SIM</option>
                            <option value="NÃO">NÃO</option>
                            <option value="N/A">N/A</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Localização e Envolvente</legend>
                <div class="grid-layout">
                    <div class="form-group">
                        <label for="zona">Zona:</label>
                        <select id="zona" name="zona" required>
                            <option value="RESIDENCIAL DE PRIMEIRA HABITAÇÃO">RESIDENCIAL DE PRIMEIRA HABITAÇÃO</option>
                            <option value="RESIDENCIAL DE SEGUNDA HABITAÇÃO">RESIDENCIAL DE SEGUNDA HABITAÇÃO</option>
                            <option value="RURAL">RURAL</option>
                            <option value="SERVIÇOS">SERVIÇOS</option>
                            <option value="INDUSTRIAL">INDUSTRIAL</option>
                            <option value="COMERCIAL">COMERCIAL</option>
                            <option value="BALNEAR">BALNEAR</option>
                            <option value="TURÍSTICA">TURÍSTICA</option>
                            <option value="MISTA">MISTA</option>
                            <option value="OUTRA">OUTRA</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="tendenciaDesenvUrbanistico">Tendência Urbanística:</label>
                        <select id="tendenciaDesenvUrbanistico" name="tendenciaDesenvUrbanistico" required>
                            <option value="ZONA NOVA">ZONA NOVA</option>
                            <option value="EM EXPANSÃO">EM EXPANSÃO</option>
                            <option value="ESTABILIZADA">ESTABILIZADA</option>
                            <option value="EM RECUPERAÇÃO">EM RECUPERAÇÃO</option>
                            <option value="EM DEGRADAÇÃO">EM DEGRADAÇÃO</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="valorComercialLocalizacao">Valor Comercial da Loc.:</label>
                        <select id="valorComercialLocalizacao" name="valorComercialLocalizacao" required>
                            <option value="MUITO BOM">MUITO BOM</option>
                            <option value="BOM">BOM</option>
                            <option value="REGULAR">REGULAR</option>
                            <option value="DEFICIENTE">DEFICIENTE</option>
                            <option value="MAU">MAU</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="facilComercializacao">Facil. Comercialização:</label>
                        <select id="facilComercializacao" name="facilComercializacao" required>
                            <option value="IMEDIATA (até 6 meses)">IMEDIATA (até 6 meses)</option>
                            <option value="NORMAL (7 a 18 meses)">NORMAL (7 a 18 meses)</option>
                            <option value="DIFÍCIL (19 a 36 meses)">DIFÍCIL (19 a 36 meses)</option>
                            <option value="MTO DIFÍCIL (mais de 36 meses)">MTO DIFÍCIL (mais de 36 meses)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="viewQuality">Qualidade das Vistas:</label>
                        <select id="viewQuality" name="viewQuality" required>
                            <option value="Péssimo">Péssimo</option>
                            <option value="Mau">Mau</option>
                            <option value="Razoável">Razoável</option>
